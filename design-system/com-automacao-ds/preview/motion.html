<!doctype html>
<!-- @dsCard group="Spacing" name="Motion easings" subtitle="Standard · Out ★ · Spring" viewport="700x220" --><html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; }
  .track { position: relative; height: 40px; background: var(--gray-100); border-radius: 999px; overflow: hidden; margin-bottom: 8px; }
  .dot { position: absolute; left: 4px; top: 50%; transform: translate(0, -50%); width: 32px; height: 32px; background: #000; border-radius: 999px; animation-duration: 2400ms; animation-iteration-count: infinite; animation-direction: alternate; }
  .d1 { animation-name: slide; animation-timing-function: cubic-bezier(0.4,0,0.2,1); }
  .d2 { animation-name: slide; animation-timing-function: cubic-bezier(0.16,1,0.3,1); }
  .d3 { animation-name: slide; animation-timing-function: cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes slide { to { left: calc(100% - 36px); } }
  .meta { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; color: var(--gray-500); margin-top: -4px; margin-bottom: 10px; }
  .label { font-weight: 600; color: #000; }
</style>
</head><body>
  <div class="meta"><span class="label">standard</span><span>cubic-bezier(.4, 0, .2, 1)</span></div>
  <div class="track"><div class="dot d1"></div></div>
  <div class="meta"><span class="label">out ★</span><span>cubic-bezier(.16, 1, .3, 1)</span></div>
  <div class="track"><div class="dot d2"></div></div>
  <div class="meta"><span class="label">spring</span><span>cubic-bezier(.34, 1.56, .64, 1)</span></div>
  <div class="track"><div class="dot d3"></div></div>
</body></html>
