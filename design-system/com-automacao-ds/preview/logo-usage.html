<!doctype html>
<!-- @dsCard group="Brand" name="Logo usage" subtitle="On black · on white · mark only" viewport="700x200" --><html><head><meta charset="utf-8"><title>Logo usage</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .split { display: grid; grid-template-columns: 1fr 1fr 1fr; min-height: 200px; }
  .cell { display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; }
  .cell.black { background: #000; }
  .cell.white { background: #fff; border: 1px solid #E5E5EA; }
  .cell.gray { background: #F2F2F2; }
  img.h { height: 30px; }
  img.m { height: 60px; }
  .tag { position: absolute; bottom: 10px; left: 12px; font-family: var(--font-mono); font-size: 9px; color: #6E6E73; text-transform: uppercase; letter-spacing: 0.1em; }
  .cell.black .tag { color: #86868B; }
</style>
</head><body>
  <div class="split">
    <div class="cell black"><img class="h" src="../assets/logo-horizontal-white.png"><span class="tag">on black — primary</span></div>
    <div class="cell white"><img class="h" src="../assets/logo-horizontal-black.png"><span class="tag">on white</span></div>
    <div class="cell gray"><img class="m" src="../assets/logo-mark-black.png"><span class="tag">mark only</span></div>
  </div>
</body></html>
