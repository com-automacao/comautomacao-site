<!doctype html>
<!-- @dsCard group="Components" name="Form inputs" subtitle="Text fields, textarea, checkbox" viewport="700x260" --><html><head><meta charset="utf-8"><title>Forms</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  label { font-size: 12px; color: var(--gray-500); letter-spacing: 0.01em; }
  input, textarea, select { font-family: var(--font-sans); font-size: 15px; padding: 11px 14px; border-radius: 10px; border: 1px solid #D2D2D7; background: #fff; color: #000; transition: border-color 200ms, box-shadow 200ms; outline: none; }
  input:focus, textarea:focus, select:focus { border-color: #000; box-shadow: 0 0 0 3px rgba(0,0,0,0.08); }
  input::placeholder { color: #A1A1A6; }
  .row7 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .check { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #000; }
  .check input { width: 18px; height: 18px; accent-color: #000; }
</style>
</head><body>
  <div class="row7">
    <div class="field">
      <label>Nome</label>
      <input type="text" placeholder="Seu nome">
    </div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" placeholder="voce@empresa.com">
    </div>
  </div>
  <div class="field">
    <label>Conte sobre o projeto</label>
    <textarea rows="2" placeholder="O que você quer automatizar?"></textarea>
  </div>
  <div class="check"><input type="checkbox" checked> Quero receber novidades (raramente).</div>
</body></html>
