<!doctype html>
<!-- @dsCard group="Colors" name="Neutrals scale" subtitle="13-stop monochrome — the only palette" viewport="700x190" --><html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(13, 1fr); gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .sw { height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; font-family: var(--font-mono); font-size: 9px; }
  .sw.dark { color: #fff; }
  .sw.light { color: #111; }
  .sw .n { opacity: .8; }
  .title { font-size: 13px; font-weight: 600; margin: 0 0 10px 0; letter-spacing: -0.01em; }
  .sub { font-size: 11px; color: var(--gray-500); margin: 0 0 14px 0; }
</style>
</head><body>
  <div class="title">Neutrals — the only palette</div>
  <div class="sub">Preto absoluto → branco absoluto, 13 paradas. Não existem cores acento na marca.</div>
  <div class="scale">
    <div class="sw dark" style="background:#000"><span class="n">000</span><span>black</span></div>
    <div class="sw dark" style="background:#0A0A0A"><span class="n">0A</span><span>950</span></div>
    <div class="sw dark" style="background:#141414"><span class="n">14</span><span>900</span></div>
    <div class="sw dark" style="background:#1F1F1F"><span class="n">1F</span><span>800</span></div>
    <div class="sw dark" style="background:#2E2E2E"><span class="n">2E</span><span>700</span></div>
    <div class="sw dark" style="background:#4A4A4A"><span class="n">4A</span><span>600</span></div>
    <div class="sw dark" style="background:#6E6E73"><span class="n">6E</span><span>500</span></div>
    <div class="sw light" style="background:#86868B;color:#fff"><span class="n">86</span><span>400</span></div>
    <div class="sw light" style="background:#A1A1A6"><span class="n">A1</span><span>300</span></div>
    <div class="sw light" style="background:#D2D2D7"><span class="n">D2</span><span>200</span></div>
    <div class="sw light" style="background:#E5E5EA"><span class="n">E5</span><span>150</span></div>
    <div class="sw light" style="background:#F2F2F2"><span class="n">F2</span><span>100</span></div>
    <div class="sw light" style="background:#FFFFFF;border-left:1px solid var(--border)"><span class="n">FF</span><span>white</span></div>
  </div>
</body></html>
