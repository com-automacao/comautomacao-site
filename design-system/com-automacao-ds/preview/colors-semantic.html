<!doctype html>
<!-- @dsCard group="Colors" name="Semantic colors" subtitle="Light + dark theme tokens side by side" viewport="700x300" --><html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px 22px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .panel { border-radius: 12px; border: 1px solid var(--border); padding: 14px; }
  .panel.dark { background: #000; color: #fff; border-color: #2E2E2E; }
  .row2 { display:flex; align-items:center; gap:10px; margin: 4px 0; font-size: 12px; }
  .dot { width: 16px; height: 16px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); }
  .panel.dark .dot { border-color: rgba(255,255,255,0.15); }
  .key { width: 84px; font-family: var(--font-mono); font-size: 10px; opacity: .7; }
  .name { font-weight: 500; }
  h4 { margin: 0 0 8px 0; font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; }
  .panel.dark h4 { color: #A1A1A6; }
  .panel h4 { color: var(--gray-500); }
</style>
</head><body>
  <div class="grid">
    <div class="panel">
      <h4>Light theme</h4>
      <div class="row2"><span class="dot" style="background:#fff;border-color:#D2D2D7"></span><span class="name">--bg</span><span class="key">#FFFFFF</span></div>
      <div class="row2"><span class="dot" style="background:#F7F7F8"></span><span class="name">--bg-elev</span><span class="key">#F7F7F8</span></div>
      <div class="row2"><span class="dot" style="background:#F2F2F2"></span><span class="name">--bg-sunken</span><span class="key">#F2F2F2</span></div>
      <div class="row2"><span class="dot" style="background:#000"></span><span class="name">--fg-1</span><span class="key">#000000</span></div>
      <div class="row2"><span class="dot" style="background:#6E6E73"></span><span class="name">--fg-2</span><span class="key">#6E6E73</span></div>
      <div class="row2"><span class="dot" style="background:#86868B"></span><span class="name">--fg-3</span><span class="key">#86868B</span></div>
      <div class="row2"><span class="dot" style="background:#D2D2D7"></span><span class="name">--border</span><span class="key">#D2D2D7</span></div>
    </div>
    <div class="panel dark">
      <h4>Dark theme</h4>
      <div class="row2"><span class="dot" style="background:#000"></span><span class="name">--bg</span><span class="key">#000000</span></div>
      <div class="row2"><span class="dot" style="background:#0A0A0A"></span><span class="name">--bg-elev</span><span class="key">#0A0A0A</span></div>
      <div class="row2"><span class="dot" style="background:#141414"></span><span class="name">--bg-sunken</span><span class="key">#141414</span></div>
      <div class="row2"><span class="dot" style="background:#fff"></span><span class="name">--fg-1</span><span class="key">#FFFFFF</span></div>
      <div class="row2"><span class="dot" style="background:#A1A1A6"></span><span class="name">--fg-2</span><span class="key">#A1A1A6</span></div>
      <div class="row2"><span class="dot" style="background:#86868B"></span><span class="name">--fg-3</span><span class="key">#86868B</span></div>
      <div class="row2"><span class="dot" style="background:#1F1F1F"></span><span class="name">--border</span><span class="key">#1F1F1F</span></div>
    </div>
  </div>
</body></html>
