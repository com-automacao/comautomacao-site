<!doctype html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="4 · 8 · 12 · 18★ · 24 · 32 · pill" viewport="700x170" --><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .row4 { display: flex; align-items: center; gap: 18px; }
  .chip { width: 72px; height: 72px; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 10px; gap: 3px; }
  .chip .n { font-size: 13px; font-weight: 600; }
  .chip.pill { width: 140px; border-radius: 999px; }
  .label { font-size: 11px; color: var(--gray-500); margin-top: 16px; font-family: var(--font-mono); }
</style>
</head><body>
  <div class="row4">
    <div class="chip" style="border-radius:4px"><span class="n">4</span><span>xs</span></div>
    <div class="chip" style="border-radius:8px"><span class="n">8</span><span>sm</span></div>
    <div class="chip" style="border-radius:12px"><span class="n">12</span><span>md</span></div>
    <div class="chip" style="border-radius:18px"><span class="n">18</span><span>lg ★</span></div>
    <div class="chip" style="border-radius:24px"><span class="n">24</span><span>xl</span></div>
    <div class="chip" style="border-radius:32px"><span class="n">32</span><span>2xl</span></div>
    <div class="chip pill"><span class="n">999</span><span>pill</span></div>
  </div>
  <div class="label">★ 18px é o raio canônico de cards (Apple-style)</div>
</body></html>
