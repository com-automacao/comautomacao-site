<!doctype html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary · secondary · ghost — sm/md/lg" viewport="700x230" --><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; }
  .btn { font-family: var(--font-sans); font-size: 15px; font-weight: 500; padding: 10px 20px; border-radius: 999px; border: 0; cursor: pointer; transition: all 200ms cubic-bezier(.16,1,.3,1); display: inline-flex; align-items: center; gap: 8px; }
  .btn.primary { background: #000; color: #fff; }
  .btn.primary:hover { background: #1F1F1F; transform: translateY(-1px); }
  .btn.secondary { background: transparent; color: #000; border: 1px solid #A1A1A6; }
  .btn.secondary:hover { background: #F2F2F2; border-color: #000; }
  .btn.ghost { background: transparent; color: #000; padding: 10px 12px; }
  .btn.ghost:hover { opacity: 0.6; }
  .btn.sm { font-size: 13px; padding: 6px 14px; }
  .btn.lg { font-size: 17px; padding: 14px 28px; }
  .row6 { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--gray-500); width: 80px; display: inline-block; }
  svg { width: 14px; height: 14px; stroke-width: 2; }
</style>
</head><body>
  <div class="row6"><span class="label">primary</span>
    <button class="btn primary sm">Começar</button>
    <button class="btn primary">Vamos decolar <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    <button class="btn primary lg">Peça um orçamento</button>
  </div>
  <div class="row6"><span class="label">secondary</span>
    <button class="btn secondary sm">Ver planos</button>
    <button class="btn secondary">Conhecer a equipe</button>
  </div>
  <div class="row6"><span class="label">ghost</span>
    <button class="btn ghost">Saiba mais →</button>
  </div>
</body></html>
