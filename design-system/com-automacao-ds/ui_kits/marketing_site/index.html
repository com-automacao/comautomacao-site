<!doctype html>
<!-- @dsCard group="UI Kit — Marketing Site" name="Marketing site — mobile" subtitle="Interactive mobile-first prototype" viewport="440x900" -->
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Com Automação</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: #fff; }
    body { font-family: var(--font-sans); color: #000; }
    * { box-sizing: border-box; }
    a { color: inherit; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    /* responsive helpers */
    .desktop-only { display: flex; }
    .mobile-only { display: none; }
    @media (max-width: 740px) {
      .desktop-only { display: none !important; }
      .mobile-only { display: flex !important; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* viewport toggle chrome (not part of product) */
    #toggle-bar {
      position: fixed; top: 10px; right: 10px; z-index: 1000;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(16px);
      border: 1px solid #D2D2D7; border-radius: 999px; padding: 4px;
      display: flex; gap: 2px; font-size: 12px;
    }
    #toggle-bar button {
      background: transparent; border: 0; padding: 6px 14px; border-radius: 999px;
      cursor: pointer; color: #6E6E73; font-family: inherit;
    }
    #toggle-bar button.on { background: #000; color: #fff; }

    .phone-frame {
      width: 390px; margin: 20px auto; border-radius: 44px; overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.2), 0 0 0 10px #1a1a1a, 0 0 0 11px #333;
      background: #fff;
      height: 844px;
    }
    .phone-frame .scroll-area { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .full-mode #root { height: auto; }
    .full-mode .phone-frame { all: unset; display: block; background: #fff; }
    .full-mode .scroll-area { height: auto; overflow: visible; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="toggle-bar">
    <button id="btn-mobile" class="on">Mobile</button>
    <button id="btn-desktop">Desktop</button>
  </div>
  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Process.jsx"></script>
  <script type="text/babel" src="CaseStudy.jsx"></script>
  <script type="text/babel" src="ContactForm.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <div className="phone-frame">
          <div className="scroll-area" data-scroll-container>
            <Header />
            <Hero />
            <Services />
            <Process />
            <CaseStudy />
            <ContactForm />
            <Footer />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    // viewport toggle
    const btnM = document.getElementById('btn-mobile');
    const btnD = document.getElementById('btn-desktop');
    btnM.onclick = () => { document.body.classList.remove('full-mode'); btnM.classList.add('on'); btnD.classList.remove('on'); };
    btnD.onclick = () => { document.body.classList.add('full-mode'); btnD.classList.add('on'); btnM.classList.remove('on'); };
  </script>
</body>
</html>
